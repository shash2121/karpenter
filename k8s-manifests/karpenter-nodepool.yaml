---
# NodePool — tells Karpenter WHEN and WHAT to provision.
# A NodePool binds to one or more EC2NodeClass objects and defines the
# scheduling constraints (labels, taints, instance categories) and the
# autoscaling limits.
#
# Reference: https://karpenter.sh/docs/concepts/nodepools/
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  # Template applied to every node Karpenter provisions from this pool
  template:
    metadata:
      labels:
        NodePool: default
    spec:
      # Reference the EC2NodeClass created above
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      # Broad set of instance types so Karpenter can pick the cheapest /
      # best-fit option. Small + medium instances keep the demo cheap.
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - t3.small
            - m7i-flex.large
            - c7i-flex.large

  # Resource limits cap total spend / node count
  limits:
    cpu: 100
    memory: 200Gi

  # Disruption policy — how aggressively Karpenter replaces nodes
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s
    budgets:
      - nodes: "10%"
